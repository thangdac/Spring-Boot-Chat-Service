version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chat_service_db
    ports:
      - "3306:3306"
    volumes:
      - e945df58cee239440689152ed5c04e2391b8613e3b6136454a0033a7469bc8d2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chat-service-app:1.0.0
    container_name: chat_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

volumes:
  e945df58cee239440689152ed5c04e2391b8613e3b6136454a0033a7469bc8d2:
    external: true    # dùng volume có sẵn, không tạo mới